    <div style="max-width:600px; margin:0 auto 30px; display:grid; grid-template-columns:1fr 1fr; gap:20px;">
      <div class="form-group">
        <label for="class">1. Select Class</label>
        <select id="class" onchange="loadFaculty()">

          <option value="11">Class 11 Intermediate</option>
          <option value="12">Class 12 Intermediate</option>

      </div>
      <div class="form-group" id="faculty-div" style="display:none;">
        <label for="faculty">2. Select Faculty/Group</label>
        <select id="faculty" onchange="showFeeDetails()">
          <option value=""></option>
        </select>
      </div>
    </div>
